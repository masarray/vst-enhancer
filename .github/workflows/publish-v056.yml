name: Publish ArSonKuPik v0.5.6 Public Beta

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-v056.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-arsonkupik-v056
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      VERSION: 0.5.6
      TAG: v0.5.6
      ARTIFACT_URL: 'https://sdmntprnznorth.oaiusercontent.com/files/00000000-c6e4-720b-b719-a59bc0886101/raw?se=2026-07-13T11:41:28Z&sp=r&sv=2026-02-06&sr=b&scid=f1ba1911-19a1-5386-92a7-6df782c6207b&skoid=d5627e4c-566b-4761-a954-54993b0ed17b&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-13T09:04:15Z&ske=2026-07-15T09:04:15Z&sks=b&skv=2026-02-06&sig=D5IeIGDcNQsKnBmS8aN557d28PVdkGWm1Y/1nUyy9bA%3D'
    steps:
      - name: Checkout public release repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download validated private build artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri $env:ARTIFACT_URL -OutFile source-artifact.zip
          Expand-Archive source-artifact.zip -DestinationPath source-artifact -Force

          $vst3 = 'source-artifact/build-dual/ArSonKuPikVST_artefacts/Release/VST3/ArSonKuPik.vst3'
          $exe  = 'source-artifact/build-dual/ArSonKuPikVST_artefacts/Release/Standalone/ArSonKuPik.exe'
          if (-not (Test-Path $vst3 -PathType Container)) { throw 'Validated VST3 bundle missing.' }
          if (-not (Test-Path $exe -PathType Leaf)) { throw 'Validated Standalone executable missing.' }

      - name: Package VST3 and Standalone
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force release, staging-vst3, staging-standalone | Out-Null

          Copy-Item 'source-artifact/build-dual/ArSonKuPikVST_artefacts/Release/VST3/ArSonKuPik.vst3' 'staging-vst3/ArSonKuPik.vst3' -Recurse -Force
          Copy-Item 'source-artifact/build-dual/ArSonKuPikVST_artefacts/Release/Standalone/ArSonKuPik.exe' 'staging-standalone/ArSonKuPik.exe' -Force

          @'
          ArSonKuPik v0.5.6 Public Beta — Windows x64

          VST3 installation:
          Copy ArSonKuPik.vst3 to:
          C:\Program Files\Common Files\VST3\

          Standalone:
          Run ArSonKuPik.exe directly.

          The build is unsigned. Windows SmartScreen may show a warning.
          Verify downloads using SHA256SUMS.txt from the same GitHub Release.
          '@ | Set-Content staging-vst3/INSTALL.txt -Encoding UTF8
          Copy-Item staging-vst3/INSTALL.txt staging-standalone/INSTALL.txt

          Compress-Archive -Path 'staging-vst3/*' -DestinationPath "release/ArSonKuPik-v$env:VERSION-Windows-x64-VST3.zip" -CompressionLevel Optimal -Force
          Compress-Archive -Path 'staging-standalone/*' -DestinationPath "release/ArSonKuPik-v$env:VERSION-Windows-x64-Standalone.zip" -CompressionLevel Optimal -Force

      - name: Build Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }
          if (-not (Test-Path $iscc)) { throw 'Inno Setup compiler not available.' }

          $root = (Resolve-Path '.').Path
          $vstSource = Join-Path $root 'staging-vst3\ArSonKuPik.vst3\*'
          $exeSource = Join-Path $root 'staging-standalone\ArSonKuPik.exe'
          $outDir = Join-Path $root 'release'
          @"
          #define MyAppName "ArSonKuPik"
          #define MyAppVersion "$env:VERSION"
          #define MyAppPublisher "MasArray"
          #define MyAppExeName "ArSonKuPik.exe"

          [Setup]
          AppId={{F458B840-8A6A-4E07-86E8-9B44C78D0560}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\MasArray\ArSonKuPik
          DefaultGroupName=MasArray\ArSonKuPik
          OutputDir=$outDir
          OutputBaseFilename=ArSonKuPik-v$env:VERSION-Windows-x64-Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          PrivilegesRequired=admin
          WizardStyle=modern
          UninstallDisplayIcon={app}\{#MyAppExeName}

          [Files]
          Source: "$vstSource"; DestDir: "{commoncf64}\VST3\ArSonKuPik.vst3"; Flags: ignoreversion recursesubdirs createallsubdirs
          Source: "$exeSource"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\ArSonKuPik"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\ArSonKuPik"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "Launch ArSonKuPik"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content installer.iss -Encoding UTF8

          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { throw 'Installer compilation failed.' }

      - name: Generate checksums and release notes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem release -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content release/SHA256SUMS.txt -Encoding ascii

          @'
          # ArSonKuPik v0.5.6 Public Beta

          This release incorporates the approved listening-feedback build.

          ## Highlights
          - New **Dangdut Koplo** creative preset with tight kick/sub pressure, lively kendang attack, forward vocal and open treble.
          - Mas Ari Signature gains a restrained deep-bass extension while remaining stable.
          - SonKu Deep Chest receives clearer presence, detail and air.
          - Fixed audible slow volume rocking in Signature and Deep Chest using a stable headroom/WOW architecture.
          - Exact flat liquid surface when no signal is present.
          - Fixed remaining About-card mojibake.
          - Added laminated black-glass treatment to the Smart Protect panel.
          - Smooth preset changes and crackle-free macro automation retained.

          ## Validation
          - DSP and bass-burst pumping gate: PASS
          - Crackle regression: PASS
          - Runtime Unicode verification: PASS
          - Windows VST3 and Standalone build: PASS

          Windows 10/11 x64. The binaries are unsigned, so Windows SmartScreen may display a warning.
          Verify all files with `SHA256SUMS.txt`.
          '@ | Set-Content release-notes.md -Encoding UTF8

      - name: Publish or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $assets = Get-ChildItem release -File | ForEach-Object { $_.FullName }
          gh release view $env:TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG $assets --clobber
            gh release edit $env:TAG --title "ArSonKuPik v$env:VERSION Public Beta" --notes-file release-notes.md --latest
          } else {
            gh release create $env:TAG $assets --target main --title "ArSonKuPik v$env:VERSION Public Beta" --notes-file release-notes.md --latest
          }

      - name: Update public metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $published = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
          $metadata = [ordered]@{
            version = "v$env:VERSION"
            channel = 'public-beta'
            editableBetaDays = 365
            readOnlyAfterBeta = $true
            audioContinuesAfterBeta = $true
            offlineActivation = $true
            keyActivatorDistributedPublicly = $false
            activationCodeProvider = 'Mas Ari'
            publishedAt = $published
            releaseUrl = "https://github.com/masarray/vst-enhancer/releases/tag/v$env:VERSION"
            installerUrl = "https://github.com/masarray/vst-enhancer/releases/download/v$env:VERSION/ArSonKuPik-v$env:VERSION-Windows-x64-Setup.exe"
            vst3Url = "https://github.com/masarray/vst-enhancer/releases/download/v$env:VERSION/ArSonKuPik-v$env:VERSION-Windows-x64-VST3.zip"
            standaloneUrl = "https://github.com/masarray/vst-enhancer/releases/download/v$env:VERSION/ArSonKuPik-v$env:VERSION-Windows-x64-Standalone.zip"
            checksumsUrl = "https://github.com/masarray/vst-enhancer/releases/download/v$env:VERSION/SHA256SUMS.txt"
            unsigned = $true
          }
          $metadata | ConvertTo-Json | Set-Content site/release.json -Encoding UTF8

          $readme = Get-Content README.md -Raw
          $readme = $readme -replace 'ArSonKuPik v0\.5\.1', "ArSonKuPik v$env:VERSION"
          $readme = $readme -replace 'v0\.5\.1 Public Beta', "v$env:VERSION Public Beta"
          $readme = $readme -replace 'releases/tag/v0\.5\.1', "releases/tag/v$env:VERSION"
          Set-Content README.md $readme -Encoding UTF8

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md site/release.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update public metadata for v$env:VERSION [skip ci]"
            git push origin HEAD:main
          }
