name: Validate public landing and release metadata

on:
  workflow_dispatch:
    inputs:
      check_remote:
        description: Also verify that official release URLs respond
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Local self-hosted validation
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate public repository and trial funnel
        shell: powershell
        run: |
          $arguments = @()
          if ("${{ inputs.check_remote }}" -eq "true") {
            $arguments += "--check-remote"
          }
          .\tools\validate-public-release.ps1 @arguments
