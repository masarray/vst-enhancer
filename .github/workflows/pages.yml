name: Deploy ArSonKuPik VST Landing Page

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "tools/sync-latest-release.py"
      - "tools/validate-public-release.py"
      - "tools/validate-latest-release.py"
      - ".github/workflows/pages.yml"
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize latest GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/sync-latest-release.py --allow-reviewed-fallback

      - name: Validate landing page and release metadata
        run: |
          python tools/validate-public-release.py
          python tools/validate-latest-release.py

      - name: Validate JavaScript syntax
        run: |
          node --check site/site-v6.js
          node --check site/experience-v4.js

      - name: Validate landing page binary assets
        shell: bash
        run: |
          test -s site/assets/arsonkupik-vst-ui-v050.webp
          test -s site/assets/arsonkupik-vst-favicon.ico
          test -s site/assets/arsonkupik-vst-favicon-96.png
          file site/assets/arsonkupik-vst-ui-v050.webp | grep -qi webp
          file site/assets/arsonkupik-vst-favicon-96.png | grep -qi png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
