name: Deploy ArSonKuPik VST Landing Page

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate landing page and binary assets
        shell: bash
        run: |
          test -f site/index.html
          test -f site/styles.css
          test -f site/app.js
          test -f site/release.json
          test -s site/assets/arsonkupik-vst-ui-v050.webp
          test -s site/assets/arsonkupik-vst-favicon.ico
          test -s site/assets/arsonkupik-vst-favicon-96.png
          file site/assets/arsonkupik-vst-ui-v050.webp | grep -qi webp
          file site/assets/arsonkupik-vst-favicon-96.png | grep -qi png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
